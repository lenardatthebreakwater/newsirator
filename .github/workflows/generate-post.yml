name: Generate Facebook Post

on:
  schedule:
    # Runs at 09:00 UTC, Monday through Friday
    - cron: '0 9 * * 1-5'
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  generate-and-post:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Run Newsirator Pipeline
        env:
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          PAGE1_ACCESS_TOKEN: ${{ secrets.PAGE1_ACCESS_TOKEN }}
        run: node index.js config.json

      - name: Commit published.json
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add *.json
          # Only commit if there are changes
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: update published.json logs [skip ci]"
          git push
